<VirtualHost *:80>
    ServerName voc.ebarrab.com

    # Archivos estáticos servidos por Apache
    DocumentRoot /var/www/voc
    DirectoryIndex index.html

    <Directory /var/www/voc>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Reenvía /api/* al servidor Node.js
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:3000/api/
    ProxyPassReverse /api/ http://127.0.0.1:3000/api/

    ErrorLog  ${APACHE_LOG_DIR}/voc-error.log
    CustomLog ${APACHE_LOG_DIR}/voc-access.log combined
</VirtualHost>
